name: Daily Job Scrape

on:
  schedule:
    # Run weekdays (Mon-Fri) at 12:00 UTC (7:00 AM CT). ~22 runs/mo at ~24
    # SerpAPI searches/run stays under the 3-key free budget (~750/mo) with margin.
    - cron: "0 12 * * 1-5"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY_1: ${{ secrets.SERPAPI_KEY_1 }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python run_scraper.py

      - name: Commit and push updated data
        run: |
          git config user.name "Job Scraper Bot"
          git config user.email "bot@example.com"
          git add data/jobs.json data/rejected.json dashboard/data/jobs.json dashboard/data/rejected.json
          git diff --staged --quiet || git commit -m "data: update job listings $(date -u +%Y-%m-%d)"
          git push
